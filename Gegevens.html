<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKDB Innovatielab - Toegangspoort</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="logo-placeholder">IKDB INNOVATIELAB</div>
    <h2>Veiligheidsregistratie</h2>
    <p class="subtitle">BHV-protocol 2026: Registratie verplicht voor toegang.</p>

    <form action="https://formspree.io/f/xykbpkay" method="POST">
        
        <fieldset>
            <legend>Persoonlijke Gegevens</legend>
            <label for="voornaam">Voornaam</label>
            <input type="text" id="voornaam" name="voornaam" placeholder="Jan" required>

            <label for="achternaam">Achternaam</label>
            <input type="text" id="achternaam" name="achternaam" placeholder="Janssen" required>

            <label for="email">E-mailadres</label>
            <input type="email" id="email" name="_replyto" placeholder="e-mail@voorbeeld.nl" required>

            <label for="telefoon">Eigen Telefoonnummer</label>
            <input type="tel" id="telefoon" name="telefoon" placeholder="06 12345678" required>
        </fieldset>

        <fieldset>
            <legend>Noodcontact (ICE)</legend>
            <label for="ice_naam">Naam Noodcontact</label>
            <input type="text" id="ice_naam" name="ice_naam" placeholder="Naam van contactpersoon" required>

            <label for="ice_telefoon">Telefoonnummer Noodcontact</label>
            <input type="tel" id="ice_telefoon" name="ice_telefoon" placeholder="06 87654321" required>

            <label for="ice_relatie">Relatie tot persoon</label>
            <input type="text" id="ice_relatie" name="ice_relatie" placeholder="Bijv. Partner, Ouder, Vriend" required>
        </fieldset>

        <fieldset>
            <legend>Inzetbaarheid</legend>
            <label class="checkbox-label">
                <input type="checkbox" name="bhv_aanmelden" value="Ja"> Aanmelden als actieve BHV'er
            </label>

            <p style="font-size: 13px; font-weight: bold; margin-bottom: 5px;">Aanwezig op kantoor:</p>
            <div class="days-grid">
                <label><input type="checkbox" name="dag_ma" value="Maandag"> Ma</label>
                <label><input type="checkbox" name="dag_di" value="Dinsdag"> Di</label>
                <label><input type="checkbox" name="dag_wo" value="Woensdag"> Wo</label>
                <label><input type="checkbox" name="dag_do" value="Donderdag"> Do</label>
                <label><input type="checkbox" name="dag_vr" value="Vrijdag"> Vr</label>
            </div>
        </fieldset>

        <label for="wachtwoord">Wachtwoord voor lab-toegang</label>
        <input type="password" id="wachtwoord" name="wachtwoord" placeholder="Minimaal 8 tekens" required>

        <input type="hidden" name="_next" value="https://www.ik-db.nl/bedankt">

        <button type="submit">Account aanmaken & Registreren</button>
    </form>

    <p class="footer-text">
        Uw gegevens worden veilig opgeslagen in het IKDB noodsysteem conform de AVG-richtlijnen.
    </p>
</div>

</body>
</html>
